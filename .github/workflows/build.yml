name: Gradle CI / Nightly Builds

on:
  push:
    branches:
      - '*'
    paths-ignore:
      - 'README.md'
      - '.gitignore'
      - 'CHANGELOG.md'
  pull_request:
    branches:
      - '*'
    paths-ignore:
      - 'README.md'
      - '.gitignore'
      - 'CHANGELOG.md'
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    name: Build with gradle

    steps:
      - uses: actions/checkout@v6
      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 25
          java-package: jdk
      - uses: actions/cache@v5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            ./.gradle/loom-cache
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
      - name: Build with Gradle
        run: ./gradlew :fabric:build :neoforge:build --no-daemon
      - uses: actions/upload-artifact@v6
        with:
          name: easy_commands-artifacts
          path: |
            fabric/build/libs/*.jar
            neoforge/build/libs/*.jar
