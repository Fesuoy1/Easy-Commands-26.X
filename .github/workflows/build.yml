name: Gradle CI / Nightly Builds

on:
  push:
    branches:
      - '*'
    paths-ignore:
      - 'README.md'
      - '.gitignore'
      - 'CHANGELOG.md'
  pull_request:
    branches:
      - '*'
    paths-ignore:
      - 'README.md'
      - '.gitignore'
      - 'CHANGELOG.md'
  workflow_dispatch:
    inputs:
      run_game_tests:
        description: 'Also run game tests after building'
        type: boolean
        default: false
        required: false
      game_test_platform:
        description: 'Platform to run game tests on'
        type: choice
        options:
          - both
          - fabric
          - neoforge
        default: both
        required: false
jobs:
  build:
    runs-on: ubuntu-latest
    name: Build with gradle

    steps:
      - uses: actions/checkout@v6
      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 25
          java-package: jdk
      - uses: actions/cache@v5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            ./.gradle/loom-cache
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
      - name: Build with Gradle
        run: ./gradlew :fabric:build :neoforge:build

      - name: Run Fabric game tests
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.run_game_tests && (inputs.game_test_platform == 'fabric' || inputs.game_test_platform == 'both') }}
        run: ./gradlew :fabric:runGametest

      - name: Run NeoForge game tests
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.run_game_tests && (inputs.game_test_platform == 'neoforge' || inputs.game_test_platform == 'both') }}
        run: ./gradlew :neoforge:runGametest

      - name: Stop Gradle daemon
        run: ./gradlew --stop

      - uses: actions/upload-artifact@v6
        with:
          name: easy_commands-artifacts
          path: |
            fabric/build/libs/*.jar
            neoforge/build/libs/*.jar
